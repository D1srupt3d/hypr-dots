background {
    monitor =
    path = ~/Documents/hypr-dots/wallpapers/wallpaper1.jpg
    color = rgb(76, 29, 149)  # Deep plum purple in RGB
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = rgb(59, 7, 100)  # Darker plum in RGB
    inner_color = rgb(255, 255, 255)  # White
    font_color = rgb(59, 7, 100)  # Darker plum
    fade_on_empty = true
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    rounding = -1
    check_color = rgb(255, 255, 255)  # White
    fail_color = rgb(204, 34, 34)  # Keep red for fails
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
}

label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    color = rgba(255, 255, 255, 1.0)  # White
    font_size = 55
    font_family = Hack Nerd Font
    position = -100, 40
    halign = right
    valign = bottom
}

label {
    monitor =
    text = $USER
    color = rgba(255, 255, 255, 1.0)  # White
    font_size = 20
    font_family = Hack Nerd Font
    position = -100, 160
    halign = right
    valign = bottom
}